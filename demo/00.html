            el.style.transform = "none";
            el.style.zIndex = "60";
            el.style.maxWidth = "none"; el.style.maxHeight = "none";
            el.style.opacity = "1";
            el.style.filter = "brightness(1)";
            el.classList.add("staged");
            el.classList.remove("focused");
            stagedIndex = index;
            el.offsetHeight;
            el.style.transition = "left " + aniDuration + " " + aniEasing + ", top " + aniDuration + " " + aniEasing + ", width " + aniDuration + " " + aniEasing + ", height " + aniDuration + " " + aniEasing + ", filter 0.4s ease";
            el.style.left = targetX + "px";
            el.style.top = targetY + "px";
            el.style.width = targetW + "px";
            el.style.height = targetH + "px";
            el.style.filter = "brightness(1) drop-shadow(0 24px 48px rgba(0,0,0,0.7))";
        }

        function unstageCar(index) {
            var el = carEls[index];
            var rad = (currentAngle + index * angleStep) * Math.PI / 180;
            var ringLeft = (ringR + ringR * Math.cos(rad)) + "px";
            var ringTop = (ringR + ringR * Math.sin(rad)) + "px";
            el.style.transition = "left " + aniDuration + " " + aniEasing + ", top " + aniDuration + " " + aniEasing + ", width " + aniDuration + " " + aniEasing + ", height " + aniDuration + " " + aniEasing + ", opacity 0.4s, filter 0.4s";
            el.style.position = "absolute";
            el.style.left = ringLeft;
            el.style.top = ringTop;
            el.style.width = "auto";
            el.style.height = "auto";
            el.style.maxWidth = "120px";
            el.style.maxHeight = "72px";
            el.style.transform = "translate(-50%, -50%)";
            el.style.zIndex = "";
            el.style.opacity = "0.45";
            el.style.filter = "brightness(0.55)";
            el.classList.remove("staged", "focused");
            stagedIndex = -1;
        }

        function snapToBrand(idx) {
            clearTimeout(wheelTimer); wheelTimer = null;
            if (stagedIndex >= 0) unstageCar(stagedIndex);
            var targetAngle = (FOCUS_ANGLE - idx * angleStep + 360) % 360;
            currentAngle = targetAngle;
            currentIndex = idx;
            updateRingPositions();
            enterShowcase(idx);
            scrollHint.style.opacity = "0";
        }

        function settleOnClosest() {
            var idx = getFocusedIndex();
            if (idx === currentIndex && stagedIndex === idx) return;
            if (stagedIndex >= 0) unstageCar(stagedIndex);
            var targetAngle = (FOCUS_ANGLE - idx * angleStep + 360) % 360;
            currentAngle = targetAngle;
            currentIndex = idx;
            updateRingPositions();
            enterShowcase(idx);
            scrollHint.style.opacity = "0";
        }

        function enterShowcase(idx) {
            isShowcase = true; window._isShowcase = true;
            document.getElementById("panel-slider").classList.add("showcase");
            updateLeftPanel(idx);
            updateIndicatorDots(idx);
            requestAnimationFrame(function() { requestAnimationFrame(function() { stageCar(idx); }); });
        }
        function exitShowcase() {
            if (!isShowcase) return;
            isShowcase = false; window._isShowcase = false;
            if (stagedIndex >= 0) unstageCar(stagedIndex);
            document.getElementById("panel-slider").classList.remove("showcase");
            var dots = indicator.querySelectorAll(".indicator-dot");
            dots.forEach(function(d) { d.classList.remove("active"); });
        }
        function updateLeftPanel(index) {
            var b = brands[index];
            brandLogoImg.classList.remove("pop");
            brandNameDisplay.classList.remove("pop");
            brandDesc.classList.remove("pop");
            void brandLogoImg.offsetWidth;
            brandLogoImg.src = b.logo;
                brandLogoImg.style.height = index === 8 ? '52px' : (index === 3 || index === 5 ? '168px' : '144px');
            brandNameDisplay.textContent = b.name;
            brandDesc.textContent = details[index];
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    brandLogoImg.classList.add("pop");
                    brandNameDisplay.classList.add("pop");
                    brandDesc.classList.add("pop");
                });
            });
        }

        function updateIndicatorDots(index) {
            var dots = indicator.querySelectorAll(".indicator-dot");
            dots.forEach(function(d, i) { d.classList.toggle("active", i === index); });
            if (index < 0) dots.forEach(function(d) { d.classList.remove("active"); });
        }

        function onWheel(e) {
            e.preventDefault();
            // 有车在舞台上就先塞回圆环
            if (stagedIndex >= 0) {
                unstageCar(stagedIndex);
            }
            // 实时旋转
            currentAngle = (currentAngle + e.deltaY * ROTATE_SPEED + 360) % 360;
            updateRingPositions();
            // 重置防抖：松手后才弹出
            clearTimeout(wheelTimer);
            wheelTimer = setTimeout(function() { settleOnClosest(); }, DEBOUNCE_MS);
        }

        
        function openModal(id) { if (isShowcase) exitShowcase(); document.getElementById('login-modal').classList.remove('active'); document.getElementById('register-modal').classList.remove('active'); document.getElementById(id+'-modal').classList.add('active'); }
        function closeModals() { document.getElementById('login-modal').classList.remove('active'); document.getElementById('register-modal').classList.remove('active'); }
        function switchModal(t) { closeModals(); document.getElementById(t+'-modal').classList.add('active'); }
        function handleRegister() { var u=document.getElementById('reg-username').value.trim(), e=document.getElementById('reg-email').value.trim(), p=document.getElementById('reg-pwd').value, p2=document.getElementById('reg-pwd2').value; if(!u||!e||!p){alert('请填写完整信息');return;} if(p.length<6){alert('密码至少6位');return;} if(p!==p2){alert('两次密码不一致');return;} alert('注册成功，欢迎 '+u); closeModals(); }
        function handleLogin() { var e=document.getElementById('login-email').value.trim(), p=document.getElementById('login-pwd').value; if(!e||!p){alert('请填写完整信息');return;} alert('登录成功，欢迎回来'); closeModals(); }
        document.querySelectorAll('.modal-overlay').forEach(function(ov){ ov.addEventListener('click',function(e){if(e.target===ov)closeModals();}); });
        document.querySelectorAll(".submenu a[data-brand]").forEach(function(link) {
            link.addEventListener("click", function(e) {
                e.preventDefault();
                snapToBrand(parseInt(this.dataset.brand));
            });
        });

        function onKeyDown(e) {
            if (e.key === "ArrowDown" || e.key === "ArrowRight") {
                e.preventDefault();
                if (stagedIndex >= 0) unstageCar(stagedIndex);
                currentAngle = (currentAngle + angleStep * 0.6) % 360;
                updateRingPositions();
                clearTimeout(wheelTimer);
                wheelTimer = setTimeout(function() { settleOnClosest(); }, DEBOUNCE_MS);
            } else if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
                e.preventDefault();
                if (stagedIndex >= 0) unstageCar(stagedIndex);
                currentAngle = (currentAngle - angleStep * 0.6 + 360) % 360;
                updateRingPositions();
                clearTimeout(wheelTimer);
                wheelTimer = setTimeout(function() { settleOnClosest(); }, DEBOUNCE_MS);
            }
        }

        function onResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() { calcRing(); updateRingPositions(); }, 200);
        }

        
        // ===== 背景粒子动画 =====
        var bgCanvas = document.getElementById("bg-canvas");
        var bgCtx = bgCanvas.getContext("2d");
        var particles = [];
        var PARTICLE_COUNT = 150;
        var REPEL_RADIUS = 76, REPEL_FORCE = 0.8;
        var mouseX = -999, mouseY = -999;
        function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
        resizeBg();
        for (var pi = 0; pi < PARTICLE_COUNT; pi++) {
            particles.push({
                x: Math.random() * bgCanvas.width,
                y: Math.random() * bgCanvas.height,
                r: Math.random() * 1.2 + 0.3,
                vx: (Math.random() - 0.5) * 0.15,
                vy: (Math.random() - 0.5) * 0.15,
                o: Math.random() * 0.4 + 0.1
            });
        }
        window.addEventListener("mousemove", function(e) { mouseX = e.clientX; mouseY = e.clientY; });
        function drawBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            particles.forEach(function(p, i) {
                var dx = p.x - mouseX, dy = p.y - mouseY;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < REPEL_RADIUS && dist > 0) {
                    var force = (1 - dist / REPEL_RADIUS) * REPEL_FORCE;
                    p.vx += (dx / dist) * force * 0.05;
                    p.vy += (dy / dist) * force * 0.05;
                }
                p.x += p.vx; p.y += p.vy;
                p.vx += (Math.random() - 0.5) * 0.0005; p.vy += (Math.random() - 0.5) * 0.0005;
                if (p.x < 0) p.x = bgCanvas.width;
                if (p.x > bgCanvas.width) p.x = 0;
                if (p.y < 0) p.y = bgCanvas.height;
                if (p.y > bgCanvas.height) p.y = 0;
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                bgCtx.fillStyle = "rgba(201,169,110," + p.o + ")";
                bgCtx.fill();
                particles.forEach(function(p2, j) {
                    if (j <= i) return;
                    var dx2 = p.x - p2.x, dy2 = p.y - p2.y;
                    var d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                    if (d2 < 150) {
                        bgCtx.beginPath();
                        bgCtx.moveTo(p.x, p.y);
                        bgCtx.lineTo(p2.x, p2.y);
                        bgCtx.strokeStyle = "rgba(201,169,110," + (0.03 * (1 - d2 / 150)) + ")";
                        bgCtx.lineWidth = 0.3;
                        bgCtx.stroke();
                    }
                });
            });
            requestAnimationFrame(drawBg);
        }
        requestAnimationFrame(drawBg);
        window.addEventListener("resize", function() { resizeBg(); });
        function init() {
            siteIntroH = siteIntro.scrollHeight; var dist = -(siteIntroH + 12); document.getElementById("panel-slider").style.setProperty("--slide-dist", dist + "px");
            
            calcRing();
            createCarElements();
            createIndicators();
            updateRingPositions();
            // 预加载所有车图，避免首次滚动卡顿
            var loaded = 0;
            brands.forEach(function(b) {
                var img = new Image();
                img.onload = img.onerror = function() {
                    loaded++;
                    if (loaded === N) {
                        ringCars.style.opacity = "1";
                    }
                };
                img.src = b.car;
            });
            updateIndicatorDots(-1);
            window.addEventListener("wheel", onWheel, { passive: false });
            window.addEventListener("keydown", onKeyDown);
            window.addEventListener("resize", onResize);
            document.body.addEventListener("click", function(e) {
                if (e.target.closest("#top-nav") || e.target.closest("#indicator") || e.target.closest(".ring-car")) return;
                exitShowcase();
            });
            setTimeout(function() { scrollHint.style.opacity = "0"; }, 6000);
        }

        init(); window._exitShowcase = exitShowcase;
    })();
    </script>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModals()">×</button>
            <h2>账号<span>登录</span></h2>
            <div class="form-group"><label>邮箱 / 用户名</label><input type="text" id="login-email" placeholder="请输入邮箱或用户名"></div>
            <div class="form-group"><label>密码</label><input type="password" id="login-pwd" placeholder="请输入密码"></div>
            <button class="btn-submit" onclick="handleLogin()">登 录</button>
            <div class="modal-switch">还没有账号？<a onclick="switchModal('register')">立即注册</a></div>
        </div>
    </div>
    <div class="modal-overlay" id="register-modal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModals()">×</button>
            <h2>创建<span>账号</span></h2>
            <div class="form-group"><label>用户名</label><input type="text" id="reg-username" placeholder="请输入用户名"></div>
            <div class="form-group"><label>邮箱</label><input type="email" id="reg-email" placeholder="请输入邮箱地址"></div>
            <div class="form-group"><label>密码</label><input type="password" id="reg-pwd" placeholder="请设置密码（至少6位）"></div>
            <div class="form-group"><label>确认密码</label><input type="password" id="reg-pwd2" placeholder="请再次输入密码"></div>
            <button class="btn-submit" onclick="handleRegister()">注 册</button>
            <div class="modal-switch">已有账号？<a onclick="switchModal('login')">立即登录</a></div>
        </div>
    </div></body>
</html>
